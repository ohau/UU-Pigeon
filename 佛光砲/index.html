<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>佛光衝擊波</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="launcher-page">
    <main class="launcher">
      <button class="launch-button" type="button" id="launchButton">開啟</button>
    </main>

    <script>
      const launchButton = document.querySelector("#launchButton");

      function openArtwork() {
        const targetHeight = Math.min(520, Math.max(360, Math.round(screen.availHeight * 0.54)));
        const imageDisplayWidth = Math.round(targetHeight * 1444 / 450);
        const startWidth = Math.round(imageDisplayWidth / 7);
        const left = screen.availLeft + screen.availWidth - startWidth;
        const top = screen.availTop + Math.max(24, Math.round((screen.availHeight - targetHeight) / 2));
        const features = [
          `popup=yes`,
          `width=${startWidth}`,
          `height=${targetHeight}`,
          `left=${left}`,
          `top=${top}`,
          `menubar=no`,
          `toolbar=no`,
          `location=no`,
          `status=no`,
          `scrollbars=no`,
          `resizable=yes`
        ].join(",");

        const popup = window.open("./popup.html", "buddha-light-cannon", features);
        if (popup) {
          popup.focus();
        }
      }

      launchButton.addEventListener("click", openArtwork);
    </script>
  </body>
</html>
