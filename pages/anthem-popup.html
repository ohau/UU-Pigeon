<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>唱國歌</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000000;
        }

        .background-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000000;
            filter: saturate(1.12) contrast(1.06) brightness(0.88);
            transition: filter 180ms ease, transform 240ms ease;
        }

        .close-button {
            position: fixed;
            inset: 0 !important;
            z-index: 1;
            width: 100vw !important;
            min-width: 100vw;
            max-width: none !important;
            height: 100vh !important;
            min-height: 100vh;
            max-height: none !important;
            padding: 0;
            border: 0;
            background: transparent;
            appearance: none;
            opacity: 0;
            pointer-events: none;
            transform: scale(1);
            filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.42));
            transition: transform 150ms ease, filter 150ms ease, opacity 150ms ease;
        }

        body:hover .close-button,
        .close-button:focus-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .close-button:hover,
        .close-button:focus-visible {
            transform: scale(1);
            filter: drop-shadow(0 22px 28px rgba(0, 0, 0, 0.5));
            outline: none;
        }

        .close-button img {
            position: fixed;
            inset: 0 !important;
            display: block;
            width: 100vw !important;
            min-width: 100vw;
            max-width: none !important;
            height: 100vh !important;
            min-height: 100vh;
            max-height: none !important;
            object-fit: fill !important;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        body:has(.close-button:hover) .background-video,
        body:has(.close-button:focus-visible) .background-video {
            filter: saturate(0.75) contrast(1.08) brightness(0.62);
            transform: scale(1.015);
        }

        body:hover .close-button:active {
            transform: scale(0.98);
        }

        body:hover .close-button.is-closing,
        .close-button.is-closing {
            transform: scale(0.96);
            opacity: 0;
            pointer-events: none;
        }

    </style>
</head>
<body>
    <video class="background-video" autoplay loop playsinline></video>
    <button class="close-button" type="button" aria-label="關閉唱國歌視窗">
        <img src="../assets/images/shut_up.png" alt="Shut up，點擊關閉視窗">
    </button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const backgroundVideo = document.querySelector(".background-video");
        const closeButton = document.querySelector(".close-button");
        const videoSource = params.get("video");
        const popupTitle = params.get("label");
        const initialVolume = params.has("volume") ? Number(params.get("volume")) : 1;
        let globalVolume = Math.max(
            0,
            Math.min(1, Number.isFinite(initialVolume) ? initialVolume : 1)
        );
        let pointerInside = false;
        let closing = false;

        if (popupTitle) {
            document.title = popupTitle;
        }

        function playVideo() {
            backgroundVideo.muted = pointerInside;
            backgroundVideo.volume = globalVolume;
            backgroundVideo.play().catch(() => {});
        }

        function setGlobalVolume(volume) {
            globalVolume = Math.max(0, Math.min(1, Number(volume) || 0));
            backgroundVideo.volume = globalVolume;
        }

        function muteWhilePointerIsInside() {
            pointerInside = true;
            backgroundVideo.muted = true;
        }

        function resumeAudioAfterPointerLeaves() {
            pointerInside = false;
            backgroundVideo.muted = false;
            backgroundVideo.volume = globalVolume;
            backgroundVideo.play().catch(() => {});
        }

        function fitPopupToVideo() {
            const videoWidth = backgroundVideo.videoWidth || 16;
            const videoHeight = backgroundVideo.videoHeight || 9;
            const maxWidth = Math.min(window.screen.availWidth * 0.9, 1200);
            const maxHeight = Math.min(window.screen.availHeight * 0.9, 900);
            const fitScale = Math.min(maxWidth / videoWidth, maxHeight / videoHeight);
            const targetWidth = Math.round(videoWidth * fitScale);
            const targetHeight = Math.round(videoHeight * fitScale);
            const widthDelta = targetWidth - window.innerWidth;
            const heightDelta = targetHeight - window.innerHeight;

            if (Math.abs(widthDelta) > 2 || Math.abs(heightDelta) > 2) {
                window.resizeBy(widthDelta, heightDelta);
            }
        }

        function closePopup() {
            if (closing) {
                return;
            }

            closing = true;
            closeButton.classList.add("is-closing");
            backgroundVideo.pause();
            backgroundVideo.volume = 0;

            if (window.opener && !window.opener.closed) {
                window.opener.postMessage(
                    { type: "close-anthem-popup" },
                    window.location.origin
                );
            }

            // 與 video-popup 一樣保留延遲 self-close，作為主頁關閉失敗時的備援。
            window.setTimeout(() => window.close(), 170);
        }

        window.addEventListener("message", (event) => {
            if (event.origin !== window.location.origin) {
                return;
            }

            if (event.data?.type === "set-global-volume") {
                setGlobalVolume(event.data.volume);
            }
        });

        window.addEventListener("focus", playVideo);
        window.addEventListener("pointerdown", playVideo, { once: true });
        document.documentElement.addEventListener("mouseenter", muteWhilePointerIsInside);
        document.documentElement.addEventListener("mouseleave", resumeAudioAfterPointerLeaves);
        closeButton.addEventListener("pointerup", (event) => {
            event.preventDefault();
            event.stopPropagation();
            closePopup();
        });
        closeButton.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            if (event.detail === 0) {
                closePopup();
            }
        });

        if (videoSource) {
            backgroundVideo.src = videoSource;
            backgroundVideo.addEventListener("loadedmetadata", () => {
                fitPopupToVideo();
                playVideo();
            }, { once: true });
            playVideo();
        } else {
            backgroundVideo.remove();
        }
    </script>
</body>
</html>
